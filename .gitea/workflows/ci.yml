name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  GIT_SSL_NO_VERIFY: true
  CARGO_HOME: /cache/cargo
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  SCCACHE_REDIS_ENDPOINT: "redis://192.168.1.107:6380"
  SCCACHE_REDIS_KEY_PREFIX: "cfdb-1.93"
  SCCACHE_REDIS_EXPIRATION: "604800"
  CARGO_INCREMENTAL: "0"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: rust
    container:
      image: docker.io/library/rust:1.93
    steps:
      - name: Setup
        run: |
          set -e
          apt-get clean && apt-get update && apt-get install -y --no-install-recommends git build-essential libssl-dev pkg-config curl ca-certificates jq
          mkdir -p /cache/cargo/registry /cache/cargo/git /cache/cargo/bin /cache/rustup ~/.cargo
          ln -sf /cache/cargo/registry ~/.cargo/registry
          ln -sf /cache/cargo/git ~/.cargo/git

          if [ -d "/cache/rustup/toolchains" ]; then
            echo "Rustup cache HIT"
          else
            echo "Rustup cache MISS — seeding from image"
            cp -a /usr/local/rustup/* /cache/rustup/
          fi
          export RUSTUP_HOME=/cache/rustup
          echo "RUSTUP_HOME=/cache/rustup" >> "$GITHUB_ENV"
          rustup component add rustfmt clippy
          # cfdb-recall integration tests shell out to `rustdoc-json`, which
          # requires nightly rustdoc. Install if cache miss; cached path is
          # /cache/rustup/toolchains/nightly-*.
          if ! rustup toolchain list | grep -q '^nightly'; then
            rustup toolchain install nightly --profile minimal --component rust-docs
          fi
          rustc --version
          rustc +nightly --version

          if [ ! -f "/cache/cargo/bin/sccache" ]; then
            SCCACHE_VERSION="v0.8.2"
            curl -fsSL "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" | \
              tar xzf - --strip-components=1 -C /cache/cargo/bin/ "sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache"
            chmod +x /cache/cargo/bin/sccache
          fi
          echo "PATH=/cache/cargo/bin:${PATH}" >> "$GITHUB_ENV"

          if /cache/cargo/bin/sccache --start-server 2>&1; then
            echo "RUSTC_WRAPPER=/cache/cargo/bin/sccache" >> "$GITHUB_ENV"
            echo "sccache ready (redis: ${SCCACHE_REDIS_ENDPOINT})"
          fi

      - name: Clone
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
          git config --global url."https://oauth2:${GITHUB_TOKEN}@agency.lab:3000/".insteadOf "https://agency.lab:3000/"
          git clone --depth=1 --branch="$BRANCH" "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}.git" repo

      - name: PR body check (#240 — Closes #N enforcement)
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY:  ${{ github.event.pull_request.body }}
        run: |
          # Per #240: integration PRs that reference issues in the title
          # must carry a `Closes #N` / `Fixes #N` / `Resolves #N` footer
          # (or a `Bundle: #A, #B, #C` directive). Runs pre-compile to
          # fail fast on hygiene drift before burning cargo budget.
          cd repo
          bash ci/pr-body-check.sh

      - name: Format check
        run: |
          cd repo
          cargo fmt --all -- --check

      - name: Install graph-specs (track develop — RFC-030 §1.2)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # User directive (2026-04-19): always track graph-specs develop. We
          # reinstall on every CI run so breaking dialect changes surface on
          # the next run that tries to lint against them (RFC-030 §7.4). The
          # build is sccache-warm → typical install ~5–15s.
          git config --global url."https://oauth2:${GITHUB_TOKEN}@agency.lab:3000/".insteadOf "https://agency.lab:3000/"
          # The `graph-specs` binary lives in the `application` package of
          # the graph-specs-rust workspace — pass the package name and the
          # bin name explicitly so cargo install can resolve both.
          # `--force` is load-bearing: we track develop, so the cached binary
          # from the previous CI run must be overwritten with the current
          # develop HEAD. Without --force, cargo install would refuse on
          # second+ runs and we'd silently gate against a stale dialect.
          cargo install --git https://agency.lab:3000/yg/graph-specs-rust \
            --branch develop --root /cache/cargo --bin graph-specs --force application
          graph-specs --version

      - name: Graph-specs check (RFC-030 §3.1 anti-drift gate)
        run: |
          cd repo
          # Two passes over disjoint spec subtrees — graph-specs' --code is
          # single-value, so crates/ and tools/ are gated independently.
          # Widened in #137 to onboard tools/check-prelude-triggers/.
          # spikes/ stays structurally excluded (not walked by either pass).
          graph-specs check --specs specs/concepts/ --code crates/ \
            && graph-specs check --specs specs/tools/ --code tools/

      - name: Clippy
        run: |
          cd repo
          cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Test
        run: |
          cd repo
          cargo test --workspace --all-features

      - name: Check slim cfdb-recall (no runner feature)
        run: |
          cd repo
          cargo check -p cfdb-recall --no-default-features

      - name: Determinism check (§12.1 G1)
        run: |
          cd repo
          cargo build --release -p cfdb-cli --bin cfdb
          CFDB_BIN="$(pwd)/target/release/cfdb" bash ci/determinism-check.sh "$(pwd)/spikes/qa5-utc-now"

      - name: Predicate determinism (RFC-034 §4.1)
        run: |
          cd repo
          # RFC-034 Slice 4 / #148 — every shipped `.cfdb/predicates/*.cypher`
          # MUST produce byte-identical stdout across two consecutive
          # `cfdb check-predicate` runs on the same keyspace. Zero-tolerance;
          # no baseline file. The script extracts cfdb's own tree into a
          # tempdir keyspace, invokes each seed twice with its canonical
          # param set, and diffs stdout.
          CFDB_BIN="$(pwd)/target/release/cfdb" bash ci/predicate-determinism.sh "$(pwd)"

      - name: cfdb self-audit (RFC-030 §3.2 X-ray gate)
        run: |
          cd repo
          mkdir -p .cfdb/db
          ./target/release/cfdb extract --workspace . --db .cfdb/db --keyspace cfdb-self
          # Run every arch-ban-*.cypher rule against cfdb's own source.
          # v0.1 semantics (RFC-030 §3.2 as amended): any non-empty match
          # blocks merge. Per-class routing awaits #48 (Finding classifier).
          for rule in examples/queries/arch-ban-*.cypher; do
            echo ">> $rule"
            ./target/release/cfdb violations --db .cfdb/db --keyspace cfdb-self --rule "$rule"
          done

      - name: cfdb query smoke (RFC-030 §3.2 liveness)
        run: |
          cd repo
          # Smoke-execute every shipped .cypher query against the cfdb-self
          # keyspace produced by the previous step. v0.1 semantics: parse +
          # execute only — row count is ignored, zero rows is a pass. The
          # gate exists to catch parser regressions and SchemaVersion drift
          # at PR time. Row-count invariants live in Phase B (#343-#349
          # self-enrich-* dogfoods, EPIC #338).
          #
          # Skip protocol: a file whose first 5 lines contain a header line
          # `// smoke-skip: <reason>` is bypassed. This is the AC-6 escape
          # hatch (#339 issue body) for parameterized queries (e.g.
          # list-callers.cypher binds $qname) and template-driven queries
          # (e.g. self-enrich-deprecation.cypher substitutes
          # {{ ground_truth_count }} via tools/dogfood-enrich). The skip
          # rationale lives next to the query — no allowlist file (project
          # CLAUDE.md §3 / §6 row 5).
          #
          # Glob-driven (AC-5) — a new .cypher in either directory is
          # picked up on the next CI run with no allowlist edit.
          fail=0
          ran=0
          skipped=0
          start=$(date +%s)
          for q in examples/queries/*.cypher .cfdb/queries/*.cypher; do
            [ -f "$q" ] || continue
            if head -5 "$q" | grep -q '^// smoke-skip:'; then
              echo ">> $q (smoke-skip)"
              skipped=$((skipped + 1))
              continue
            fi
            echo ">> $q"
            if ! ./target/release/cfdb query \
                --db .cfdb/db --keyspace cfdb-self \
                "$(cat "$q")" >/dev/null; then
              fail=1
            fi
            ran=$((ran + 1))
          done
          elapsed=$(( $(date +%s) - start ))
          echo "smoke: ran=$ran skipped=$skipped elapsed=${elapsed}s"
          # AC-7 budget target: ≤30s on cfdb-self. Failure modes per AC-3
          # are parse + evaluator errors only — time overrun is logged but
          # does NOT block merge. Prescribed remediation (issue body):
          # file a separate perf issue. Local measurement at 9a9fc42 was
          # 81s wall-clock, ~21s pure-query, ~60s keyspace-reload overhead
          # across 11 invocations — tracked in the perf follow-up.
          if [ "$elapsed" -gt 30 ]; then
            echo "smoke: NOTICE — elapsed ${elapsed}s exceeds AC-7 30s target; see perf follow-up" >&2
          fi
          [ "$fail" -eq 0 ]

      - name: Edge-liveness (RFC-037 §3.7 informational)
        continue-on-error: true
        run: |
          cd repo
          # Issue #222 — flag declared edge labels with zero instances in
          # the cfdb-self keyspace. v0.3.0 policy: informational (log the
          # output, do not block merge). v0.4.0: promote to blocking
          # ban rule after one release cycle of observation. The step is
          # marked continue-on-error so a dormant-label finding surfaces
          # in the CI log but does not fail the job.
          CFDB_BIN="$(pwd)/target/release/cfdb" bash ci/edge-liveness.sh

      - name: Self-enrich dogfood (RFC-039 §3.3, default-feature subset)
        run: |
          cd repo
          # RFC-039 harness scaffolding shipped in #342; per-pass
          # `.cfdb/queries/self-enrich-*.cypher` templates land in
          # issues #343-#346 (default-feature) and #347-#349 (nightly,
          # gated separately). As each template ships, the matching
          # invocation below transitions from informational placeholder
          # to a hard gate.
          #
          # Activation status:
          #   #343 — enrich-deprecation:     ACTIVE
          #   #344 — enrich-rfc-docs:        ACTIVE (this PR)
          #   #345 — enrich-bounded-context: ACTIVE (this PR — #355 Path B
          #                                  via {{ total_items }} +
          #                                  {{ nulls_threshold }} harness
          #                                  substitution)
          #   #346 — enrich-concepts:        ACTIVE (this PR)
          cargo build -p dogfood-enrich --release --bin dogfood-enrich
          # Determinism harness — runs all shipped templates twice and
          # diffs stdout per RFC §3.4 / I1.
          CFDB_BIN="$(pwd)/target/release/cfdb" \
            DOGFOOD_BIN="$(pwd)/target/release/dogfood-enrich" \
            bash ci/dogfood-determinism.sh
          # All four default-feature passes are ACTIVE. Exit 30 on row →
          # block merge. Exit 1 (runtime error) → block merge. Exit 0 →
          # pass. Nightly-only passes (#347/#348/#349) live in their
          # own workflow file gated on the matching feature flags.
          for pass in enrich-deprecation enrich-rfc-docs enrich-bounded-context enrich-concepts; do
            echo ">> self-${pass} (ACTIVE)"
            ./target/release/dogfood-enrich \
              --pass "$pass" \
              --db .cfdb/db \
              --keyspace cfdb-self \
              --cfdb-bin "$(pwd)/target/release/cfdb" \
              --workspace "$(pwd)"
          done

      - name: Cross-dogfood — cfdb on graph-specs-rust (RFC-033 §3.2)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd repo
          # ci/cross-dogfood.sh clones yg/graph-specs-rust at the SHA pinned
          # in .cfdb/cross-fixture.toml and runs arch-ban-*.cypher against
          # that tree. Zero-false-positive invariant per RFC-033 §3.4: exit
          # 30 on any finding blocks merge. Fix at source (companion repo)
          # or scope the rule narrower — no allowlist.
          ./ci/cross-dogfood.sh
